name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
#  FRONT_IMAGE: ghcr.io/${{ github.repository }}-front
#  BACK_IMAGE: ghcr.io/${{ github.repository }}-back
#  PROXY_IMAGE: ghcr.io/${{ github.repository }}-proxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Необходим для корректной работы Bake, особенно внутри act (локально)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push with Docker Bake
        uses: docker/bake-action@v7
        with:
          files: |
            compose.yaml
            compose.prod.yaml
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            front.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/front:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/front:${{ steps.vars.outputs.sha_short }}
            back.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/back:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/back:${{ steps.vars.outputs.sha_short }}
            proxy.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/proxy:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/proxy:${{ steps.vars.outputs.sha_short }}

