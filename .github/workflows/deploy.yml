name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # Формируем названия образов на основе репозитория (в нижнем регистре)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Необходим для корректной работы Bake, особенно внутри act (локально)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request' && vars.ACT != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push with Docker Bake
        uses: docker/bake-action@v6
        with:
          files: |
            compose.yaml
            compose.prod.yaml
          # Пушим только при реальном пуше в main в GitHub (не локально и не в PR)
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ACT != 'true' }}
          # Для локального тестирования (act) загружаем образы в локальный докер
          load: ${{ vars.ACT == 'true' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            front.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/front:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/front:${{ steps.vars.outputs.sha_short }}
            back.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/back:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/back:${{ steps.vars.outputs.sha_short }}
            proxy.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/proxy:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/proxy:${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ACT != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (for compose files)
        uses: actions/checkout@v4

      - name: Copy compose files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.yaml,compose.prod.yaml"
          target: ${{ secrets.REMOTE_TARGET }}

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.REMOTE_TARGET }}
            
            # Авторизация в GHCR на сервере
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Подготовка окружения
            echo "${{ secrets.PROD_ENV }}" > .env
            echo "MODE=prod" > .env.local
            
            # Загрузка новых образов и перезапуск
            docker compose -f compose.yaml -f compose.prod.yaml pull
            docker compose -f compose.yaml -f compose.prod.yaml up -d --remove-orphans
            
            # Очистка старых данных
            docker image prune -f
