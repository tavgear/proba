services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - front
      - back

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost}
    ports:
      - "3000:3000"

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    volumes:
      - ./back:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - STRAPI_URL=${STRAPI_URL:-http://localhost}
    ports:
      - "1337:1337"

volumes:
  caddy_data:
  caddy_config:
